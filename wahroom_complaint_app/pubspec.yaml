name: wahroom_complaint_app
description: "Smart Washroom Complaint Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # State Management
  provider: ^6.1.2

  # Text to Speech
  flutter_tts: ^4.2.3

  # QR Scanner
  qr_code_scanner_plus: ^2.0.10+1

  # Camera & Gallery
  image_picker: ^1.1.2

  # Date & Time Formatting
  intl: ^0.20.2

  # Local Storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/

