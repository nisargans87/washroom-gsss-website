<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Washroom Reporting System</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<link rel="stylesheet"
href="css/style.css">


<style>

body {

    min-height:100vh;

    background-image:url("images/college-bg.jpg");

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

}


/* Main Center Wrapper */

.report-wrapper {

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px 15px;

}



/* Complete Card */

.report-container {

    width:100%;

    max-width:750px;

}



/* Header */

.report-header {

    background:linear-gradient(
    135deg,
    #0d6efd,
    #0d3b66
    );

    color:white;

    padding:30px;

    border-radius:20px 20px 0 0;

    text-align:center;

}



/* Form Card */

.form-card {

    background:white;

    border-radius:0 0 20px 20px;

    box-shadow:0px 10px 35px rgba(0,0,0,0.25);

}
/* ===========================
   Notification Toast
=========================== */
/* ===========================
   TOAST NOTIFICATION
=========================== */

.toast-card{

    position:fixed;

    top:25px;

    right:25px;

    min-width:320px;

    max-width:420px;

    background:#ffffff;

    border-radius:12px;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);

    padding:16px;

    display:none;

    z-index:9999;

    border-left:6px solid #198754;

}

.toast-content{

    display:flex;

    align-items:center;

    gap:12px;

}

.toast-card i{

    font-size:28px;

}

.toast-card.success{

    border-left-color:#198754;

    color:#198754;

}

.toast-card.error{

    border-left-color:#dc3545;

    color:#dc3545;

}

.toast-card.show{

    display:block;

    animation:slideIn .4s ease;

}

@keyframes slideIn{

    from{

        opacity:0;

        transform:translateX(100%);

    }

    to{

        opacity:1;

        transform:translateX(0);

    }

}


</style>

</head>


<body>


<div class="report-wrapper">


<div class="report-container">



<!-- HEADER CARD -->


<div class="report-header">


<h2 class="fw-bold mb-2">

Smart Washroom Reporting System

</h2>


<p class="mb-0">

Help us maintain a clean and hygienic campus by reporting issues quickly.

</p>


</div>




<!-- FORM CARD -->


<div class="card form-card border-0">


<div class="card-body p-4 p-md-5">


<h4 class="text-primary fw-bold mb-4 text-center">

Complaint Registration Form

</h4>




<form id="complaintForm">



<!-- Washroom Type -->


<div class="mb-4">


<label class="form-label fw-semibold">

Washroom Type

</label>


<div class="d-flex gap-5 mt-2">


<div class="form-check">


<input
class="form-check-input"
type="radio"
name="washroomType"
id="girls"
value="girls">


<label class="form-check-label"
for="girls">

Girls Washroom

</label>


</div>




<div class="form-check">


<input
class="form-check-input"
type="radio"
name="washroomType"
id="boys"
value="boys">


<label class="form-check-label"
for="boys">

Boys Washroom

</label>


</div>


</div>


</div>





<!-- Washroom Number -->


<div class="mb-4">


<label class="form-label fw-semibold">

Washroom Number

</label>



<select 
class="form-select"
id="roomNumber">


<option selected disabled>

Select Washroom First

</option>


</select>


</div>





<!-- Issue Category -->


<div class="mb-4">


<label class="form-label fw-semibold">

Issue Category

</label>


<select 
class="form-select"
id="issueCategory">


<option selected disabled>

Select Issue

</option>


<option>Dirty Floor</option>

<option>No Water</option>

<option>Bad Smell</option>

<option>Flush Not Working</option>

<option>Water Leakage</option>

<option>Dustbin Full</option>

<option>No Electricity</option>

<option>Other</option>


</select>


</div>





<!-- Other Issue -->


<div class="mb-4"
id="otherIssueBox"
style="display:none;">


<label class="form-label fw-semibold">

Describe the Issue

</label>


<textarea
class="form-control"
id="description"
rows="4"
placeholder="Describe the issue...">

</textarea>


</div>





<!-- Upload Photo -->


<div class="mb-4">


<label class="form-label fw-semibold">

Upload Photo (Optional)

</label>


<input
type="file"
class="form-control"
id="complaintImage"
accept=".jpg,.jpeg,.png">


</div>





<!-- Auto Generated Time -->


<div class="mb-4">


<label class="form-label fw-semibold">

Submission Time

</label>



<input

type="text"

class="form-control"

id="currentTime"

readonly

placeholder="Automatically generated time">


</div>





<button
class="btn btn-success btn-lg w-100"
type="submit">


<i class="bi bi-send-check-fill"></i>

Submit Complaint


</button>



</form>


</div>

</div>


</div>


</div>
<!-- Toast Notification -->

<div id="toast" class="toast-card">

    <div class="toast-content">

        <i id="toastIcon" class="bi"></i>

        <span id="toastMessage"></span>

    </div>

</div>


<script src="JS/report.js"></script>


</body>

</html>
